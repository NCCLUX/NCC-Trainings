# Pymarkdown configuration for the NCC-Trainings docs.
#
# Auto-discovered by `pymarkdown scan` when run from the repo root.
# If you already have a pyproject.toml, merge these tables into it.

[tool.pymarkdown.plugins.md046]
# mkdocs-material admonitions (??? / !!!) require their fenced code
# blocks to be indented 4 spaces, which pymarkdown misreads as
# "indented code block style". Disable to avoid false positives.
enabled = false

[tool.pymarkdown.plugins.md013]
# Don't enforce the 80-char line limit inside code blocks — terminal
# output (e.g. `ml` module listings, salloc commands) can't be wrapped
# without changing what is shown to the reader.
code_blocks = false
